name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Roda os testes do backend em toda PR e push ──────────────────────────
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run tests
        working-directory: backend
        run: go test ./...

  # ─── Deploy só quando o push for para main (não em PRs) ──────────────────
  deploy:
    name: Deploy to droplet
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: SSH into droplet and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key:      ${{ secrets.DROPLET_SSH_KEY }}
          # DEPLOY_PATH must match where you cloned the repo on the droplet.
          # Set it as a GitHub Secret (Settings → Secrets → Actions).
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            docker compose up -d --build --remove-orphans
            # Limpa imagens antigas para não ocupar espaço no disco
            docker image prune -f
