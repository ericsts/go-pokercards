# Place this file in /etc/nginx/sites-available/ on your droplet and symlink to sites-enabled/.
#
#   sudo ln -s /etc/nginx/sites-available/poker.ericsantos.eu.conf \
#              /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d poker.ericsantos.eu
#   sudo nginx -s reload

server {
    listen 80;
    server_name poker.ericsantos.eu;
    # Certbot will add the HTTPS block below after running the command above.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name poker.ericsantos.eu;

    # Certbot manages these paths automatically.
    ssl_certificate     /etc/letsencrypt/live/poker.ericsantos.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poker.ericsantos.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Forward all traffic to the frontend container (port must match docker-compose.yml).
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Required for WebSocket (wss://) to work through nginx.
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
    }
}
